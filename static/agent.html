<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 Agent - 杨轩的博客</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

    .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.2rem; color: #333; }
    .header a { font-size: 0.85rem; color: #c05845; text-decoration: none; }

    .container { max-width: 780px; margin: 2rem auto; padding: 0 1.5rem; }

    /* 上传区域 */
    .upload-zone {
      background: #fff; border: 2px dashed #d0d0d0; border-radius: 16px;
      padding: 3rem 2rem; text-align: center; cursor: pointer;
      transition: all 0.25s; margin-bottom: 1.5rem;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: #c05845; background: #fdf8f6; }
    .upload-zone .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .upload-zone p { color: #888; font-size: 0.95rem; }
    .upload-zone .hint { font-size: 0.8rem; color: #bbb; margin-top: 0.5rem; }

    /* API 地址配置 */
    .config-bar { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.06); display: flex; gap: 0.5rem; align-items: center; }
    .config-bar label { font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
    .config-bar input { flex: 1; padding: 0.5rem 0.75rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.85rem; outline: none; }
    .config-bar input:focus { border-color: #c05845; }
    .config-bar button { padding: 0.5rem 1rem; border-radius: 8px; border: none; background: #555; color: #fff; font-weight: 600; cursor: pointer; font-size: 0.85rem; }

    /* 处理日志 */
    .log-section { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 1.5rem; display: none; }
    .log-section h3 { font-size: 1rem; margin-bottom: 1rem; color: #333; }
    .log-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .log-item { padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.88rem; line-height: 1.6; }
    .log-thought { background: #f0f4ff; color: #335; border-left: 3px solid #5b7bca; }
    .log-action { background: #f0faf0; color: #353; border-left: 3px solid #5ca55c; }
    .log-action .tool-name { font-weight: 700; color: #2e7d32; }
    .log-error { background: #fff0f0; color: #c33; border-left: 3px solid #c55; }
    .log-done { background: #f0faf0; color: #2e7d32; border-left: 3px solid #2e7d32; font-weight: 600; }
    .log-loading { background: #f5f5f5; color: #999; font-style: italic; }

    /* 元数据编辑 */
    .meta-section { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 1.5rem; display: none; }
    .meta-section h3 { font-size: 1rem; margin-bottom: 1rem; color: #333; }
    .meta-group { margin-bottom: 1rem; }
    .meta-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: #555; }
    .meta-group input, .meta-group select { width: 100%; padding: 0.55rem 0.75rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; outline: none; }
    .meta-group input:focus, .meta-group select:focus { border-color: #c05845; }
    .meta-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.4rem; border: 1.5px solid #ddd; border-radius: 8px; min-height: 38px; }
    .meta-tags:focus-within { border-color: #c05845; }
    .meta-tags .tag { display: inline-flex; align-items: center; gap: 0.2rem; background: #f0ece4; color: #5e6b50; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.8rem; }
    .meta-tags .tag .rm { cursor: pointer; color: #999; }
    .meta-tags .tag .rm:hover { color: #c05845; }
    .meta-tags input { border: none; outline: none; flex: 1; min-width: 80px; font-size: 0.85rem; }

    .meta-preview { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 1rem; font-size: 0.85rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; font-family: "JetBrains Mono", Consolas, monospace; color: #666; }

    /* 按钮 */
    .actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .btn { padding: 0.65rem 2rem; border-radius: 8px; border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #c05845; color: #fff; }
    .btn-primary:hover { background: #a84a3a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 消息 */
    .msg { padding: 0.75rem 1rem; border-radius: 8px; margin-top: 1rem; font-size: 0.9rem; display: none; }
    .msg.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .msg.error { display: block; background: #fce4ec; color: #c62828; }
  </style>
</head>
<body>

<div class="header">
  <h1>🤖 博客 Agent</h1>
  <a href="admin.html">← 传统后台</a>
</div>

<div class="container">
  <!-- API 配置 -->
  <div class="config-bar">
    <label>API 地址:</label>
    <input type="text" id="apiBase" placeholder="http://localhost:8000 或 Cloudflare 隧道地址">
    <button onclick="saveApiBase()">保存</button>
  </div>

  <!-- 上传区域 -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📄</div>
    <p>拖拽文件到这里，或点击选择文件</p>
    <div class="hint">支持 .md .txt .py .java .pdf .docx .html 等</div>
    <input type="file" id="fileInput" style="display:none" accept=".md,.txt,.py,.java,.json,.yaml,.yml,.toml,.sh,.js,.ts,.go,.pdf,.docx,.html,.css,.sql,.log,.png,.jpg,.jpeg,.gif,.webp">
  </div>

  <!-- Agent 处理日志 -->
  <div class="log-section" id="logSection">
    <h3>🧠 Agent 思考过程</h3>
    <div class="log-list" id="logList"></div>
  </div>

  <!-- 元数据编辑 -->
  <div class="meta-section" id="metaSection">
    <h3>📝 确认文章信息</h3>
    <div class="meta-group">
      <label>标题</label>
      <input type="text" id="metaTitle">
    </div>
    <div class="meta-group">
      <label>摘要</label>
      <input type="text" id="metaSummary">
    </div>
    <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="meta-group">
        <label>分类</label>
        <select id="metaCategory">
          <option value="技术笔记">技术笔记</option>
          <option value="学习心得">学习心得</option>
          <option value="生活随笔">生活随笔</option>
          <option value="项目记录">项目记录</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="meta-group">
        <label>标签</label>
        <div class="meta-tags" id="metaTags">
          <input type="text" id="tagInput" placeholder="回车添加">
        </div>
      </div>
    </div>
    <div class="meta-group">
      <label>文件预览</label>
      <div class="meta-preview" id="metaPreview"></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="publishBtn" onclick="publishConfirmed()">确认发布</button>
    </div>
    <div class="msg" id="publishMsg"></div>
  </div>
</div>

<script>
  // ========== 配置 ==========
  const API_BASE_KEY = 'blog_agent_api_base';

  function getApiBase() {
    return localStorage.getItem(API_BASE_KEY) || '';
  }

  function saveApiBase() {
    const val = document.getElementById('apiBase').value.trim();
    localStorage.setItem(API_BASE_KEY, val);
  }

  // 初始化
  document.getElementById('apiBase').value = getApiBase();

  // ========== 上传 ==========
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');

  uploadZone.addEventListener('click', () => fileInput.click());

  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  // ========== Agent 处理 ==========
  let agentMetadata = null;
  let agentPreview = '';

  async function handleFile(file) {
    const apiBase = getApiBase();
    if (!apiBase) {
      alert('请先填写 API 地址');
      return;
    }

    // 显示日志区
    const logSection = document.getElementById('logSection');
    const logList = document.getElementById('logList');
    logSection.style.display = 'block';
    logList.innerHTML = '<div class="log-item log-loading">正在上传文件并启动 Agent...</div>';

    // 隐藏元数据区
    document.getElementById('metaSection').style.display = 'none';
    agentMetadata = null;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${apiBase}/api/agent/upload`, {
        method: 'POST',
        body: formData,
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          const payload = trimmed.slice(5).trim();
          if (payload === '[DONE]') {
            onAgentDone();
            return;
          }
          try {
            const step = JSON.parse(payload);
            onAgentStep(step);
          } catch (_) {}
        }
      }
    } catch (e) {
      logList.innerHTML = `<div class="log-item log-error">连接失败: ${e.message}<br>请检查 API 地址是否正确，后端是否已启动。</div>`;
    }
  }

  function onAgentStep(step) {
    const logList = document.getElementById('logList');
    // 移除 loading
    const loading = logList.querySelector('.log-loading');
    if (loading) loading.remove();

    const div = document.createElement('div');

    if (step.type === 'thought') {
      div.className = 'log-item log-thought';
      div.textContent = '💭 ' + step.content;
    } else if (step.type === 'action') {
      div.className = 'log-item log-action';
      const toolName = step.tool;
      const result = step.result;
      div.innerHTML = `<span class="tool-name">⚡ ${toolName}</span><br>${formatResult(result)}`;

      // 如果是 analyze_content，缓存元数据
      if (toolName === 'analyze_content' && result.title) {
        agentMetadata = result;
      }
      // 如果是 format_markdown，缓存预览
      if (toolName === 'format_markdown' && result.preview) {
        agentPreview = result.preview;
      }
    } else if (step.type === 'error') {
      div.className = 'log-item log-error';
      div.textContent = '❌ ' + step.content;
    } else if (step.type === 'done') {
      div.className = 'log-item log-done';
      div.textContent = '✅ ' + step.content;
    }

    logList.appendChild(div);
    logList.scrollTop = logList.scrollHeight;
  }

  function onAgentDone() {
    if (agentMetadata) {
      showMetaEditor();
    }
  }

  function formatResult(result) {
    if (typeof result === 'string') return result;
    if (result.error) return '❌ ' + result.error;
    // 简单展示关键字段
    const keys = Object.keys(result);
    return keys.map(k => `${k}: ${typeof result[k] === 'object' ? JSON.stringify(result[k]) : result[k]}`).join('\n');
  }

  // ========== 元数据编辑 ==========
  let editTags = [];

  function showMetaEditor() {
    const section = document.getElementById('metaSection');
    section.style.display = 'block';

    document.getElementById('metaTitle').value = agentMetadata.title || '';
    document.getElementById('metaSummary').value = agentMetadata.summary || '';
    document.getElementById('metaCategory').value = agentMetadata.category || '技术笔记';
    document.getElementById('metaPreview').textContent = agentPreview;

    editTags = agentMetadata.tags || [];
    renderEditTags();
  }

  function renderEditTags() {
    const container = document.getElementById('metaTags');
    container.innerHTML = editTags.map((t, i) =>
      `<span class="tag">${t}<span class="rm" onclick="removeEditTag(${i})">×</span></span>`
    ).join('') + '<input type="text" id="tagInput" placeholder="回车添加">';

    container.querySelector('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = e.target.value.trim();
        if (val && !editTags.includes(val)) {
          editTags.push(val);
          renderEditTags();
        }
        e.target.value = '';
      }
    });
  }

  function removeEditTag(i) {
    editTags.splice(i, 1);
    renderEditTags();
  }

  // ========== 发布 ==========
  async function publishConfirmed() {
    const apiBase = getApiBase();
    if (!apiBase) return alert('请先填写 API 地址');

    const metadata = {
      title: document.getElementById('metaTitle').value.trim(),
      summary: document.getElementById('metaSummary').value.trim(),
      category: document.getElementById('metaCategory').value,
      tags: editTags,
    };

    if (!metadata.title) return alert('请输入标题');

    const btn = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';

    try {
      // 用元数据覆盖 agent 生成的，重新调用 format + publish
      // 这里简化：直接通过 API 发一个带有修正元数据的请求
      // 实际上 agent 已经发布了，这里只是确认
      const msg = document.getElementById('publishMsg');
      msg.className = 'msg success';
      msg.textContent = '✅ 文章已发布！GitHub Actions 正在构建，约 1 分钟后可访问。';
    } catch (e) {
      const msg = document.getElementById('publishMsg');
      msg.className = 'msg error';
      msg.textContent = '❌ 发布失败: ' + e.message;
    }

    btn.disabled = false;
    btn.textContent = '确认发布';
  }
</script>

</body>
</html>
