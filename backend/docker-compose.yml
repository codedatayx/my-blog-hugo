services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6380:6379"
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ./soul.md:/app/soul.md
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/app/data/memory.db
      - SOUL_PATH=/app/soul.md
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
